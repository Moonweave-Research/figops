project:
  name: Synthetic Multipanel Figure
  description: Public-safe Graph Hub multipanel fixture.

visual_style:
  target_format: nature
  profile: baseline

sample_registry:
  - sample_id: SYN_MULTIPANEL

experimental_conditions:
  conditions:
    - id: synthetic_multipanel_fixture
      parameters:
        samples: [SYN_MULTIPANEL]

figures:
  - id: FigSynthetic_Multipanel
    title: Synthetic three-panel publication plate
    script: hub_scripts/assemble_multipanel.py
    inputs:
      - assets/panel_response.svg
      - assets/panel_distribution.svg
      - assets/panel_summary.svg
    output: results/figures/FigSynthetic_Multipanel.svg
    claim: Synthetic panels assemble into a traceable publication plate fixture.
    samples: [SYN_MULTIPANEL]
    conditions: [synthetic_multipanel_fixture]
