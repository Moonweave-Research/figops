# ==========================================
# FigOps Project Configuration Template
# ==========================================
# Purpose: project metadata and FigOps pipeline configuration.
# Location: project root where figops/orchestrator runs.

# Environment variables injected into scripts:
#   THEME_FORMAT, THEME_SCALE, THEME_PROFILE, THEME_COLORMAP
#   THEME_OUTPUT_FORMAT (from preset or step)
#   GRAPH_HUB_INPUTS (colon-separated list of resolved input file paths)
# 
schema_version: "1.1"

# Declared roles are authoritative; folder names are defaults, not meaning.
structure:
  contract: figops-project-v1.1
  roots:
    raw: raw
    scripts: hub_scripts
    analysis_scripts: hub_scripts/analysis
    figure_scripts: hub_scripts/figures
    shared_scripts: hub_scripts/shared
    results: results
    intermediate: results/data/intermediate
    source_data: results/data/source
    tables: results/tables
    figures: results/figures
    evidence: results/evidence
    publication: results/publication
  discovery: declared_first
  undeclared_files: warn

# 1. Project metadata
project:
  name: "Example Study"
  version: "1.0.0"
  target_journal: "Nature Communications"

# 1.1 Workflow intent
workflow:
  intent: "execution"           # exploration | execution | review | promotion

# 2. Visual style settings
visual_style:
  render_policy: "neutral"     # preserves authored styling; independent of validation
  target_format: "neutral"     # compatibility alias for current project renderers
  validation_target: "nature"  # publication rules implied by project.target_journal
  font_scale: 1.0              # font scale multiplier
  profile: "baseline"          # baseline profile

# ── Presets (optional) ──────────────────────────────────────────────
# Define named style bundles to avoid repeating visual settings per figure.
# Merge order: visual_style < preset < per-step inline override.
# Reference in a figure step with: preset: journal_svg
presets:
  journal_svg:
    target_format: nature
    font_scale: 1.0
    profile: baseline
    output_format: svg
  ppt_png:
    target_format: ppt
    font_scale: 1.3
    output_format: png
  # _default: journal_svg          # selecting this explicitly changes the neutral default

# 2.1 Language policy (v1.1 default: automatic detection, advisory preference)
language_policy:
  mode: "advisory"             # advisory | enforce
  analysis_lang: "auto"
  plot_lang: "auto"

# 2.2 Execution environment and reproducibility gates
environment:
  python_lock: "uv.lock"
  r_lock: "renv.lock"
  strict: false                # true blocks execution when lockfiles are missing
  uv_run: true                 # use uv-managed Python execution when available
  r_strict: false              # true activates renv for R execution
  adapters:
    prefetch: "none"           # none | gdrive
    athena: "off"              # off | legacy
    conventions: "generic"     # generic

# 2.3 Experimental metadata
experimental_conditions:
  common:
    temperature_C: 25
    humidity_pct: 40
    atmosphere: "ambient"
  conditions: []
  equipment: []
  sample_prep: []
  logged_runs: []

# 3. Data contract and semantic integrity
# Validate data before analysis/plot steps run.
data_contract:
  # Bootstrap template has no sample/condition registry yet; remove this scoped
  # opt-out after declaring claim, samples, and conditions for each figure.
  require_figure_traceability: false
  cv_threshold: 0.10  # coefficient-of-variation warning threshold
  cv_columns: ["value"]  # explicit measurement columns only; identifiers/time are not scanned
  raw_integrity:
    mode: strict
    manifest: "raw/.raw_manifest.json"
    paths: ["raw"]            # example producer below declares raw/example.csv
  csv_checks:
    - path: "results/data/source/summary.csv"
      required_columns: ["time", "value", "molarity"]
      dtypes: { time: float, value: float, molarity: number }
      # 논리적 무결성 검증 (Semantic Checks)
      semantic_checks:
        time: { range: [0, 10000], allow_null: false, monotonic: "increasing" }
        molarity: { range: [0, 50], unique: false }
        value: { range: [-2000, 2000] }
        # Replicate and grouped-noise checks for graph-defensible summaries
        # value:
        #   min_replicates: { group_by: ["molarity"], min_count: 3 }
        #   grouped_cv: { group_by: ["molarity"], threshold: 0.15, warn_only: true }
        #   log_scale_positive: true
        #   error_bar_source: { column: "sem", source: "sem" }
        #   mean_sem: { sem_column: "sem", std_column: "std", n_column: "n", tolerance: 1.0e-6 }
        #   linear_fit: { x_column: "time", slope: 2.0, intercept: 1.0, tolerance: 1.0e-6, r2_min: 0.98 }
        #   outlier_flag: { column: "outlier", allowed: [0, 1, true, false, "0", "1"], max_fraction: 0.05 }
        #   axis_unit: { data_unit: "mA", display_unit: "A" }  # compatibility check only; no data mutation
        # monotonic modes: increasing | decreasing | nondecreasing | nonincreasing
        # Unit-aware validation (requires pint): specify expected + actual units
        # current: { unit: "A", actual_unit: "mA" }  # auto-converts mA → A
        # mobility: { unit: "cm^2/V/s", actual_unit: "cm^2/V/s" }

# 3.1 Optional golden-data regression targets
golden_metrics:
  - path: "results/data/source/summary.csv"
    atol: 1.0e-6

# 4. Data pipeline
pipeline:
  analysis:
    - script: "hub_scripts/analysis/analyze.R"
      lang: "R"
      inputs: ["raw/example.csv"] # replace with a real immutable input, then seal it
      outputs: ["results/data/source/summary.csv"]
      cache: true                # enable smart build cache
      # inputs supports glob patterns: ["raw/*.csv"]
      # expand: batch (default) — all matched files in one script call
      # expand: each  — one script call per file (analysis does not support 'each')
    # Built-in reusable domain helpers can replace a project-local script:
    # - domain_helper: "materials_polymer.signal_smooth_baseline"
    #   inputs: ["raw/polymer_response.csv"]
    #   outputs: ["results/data/polymer_signal_cleaned.csv"]
    #   params:
    #     x_column: "time_s"
    #     y_column: "signal_au"
    #     window: 5
    # - domain_helper: "materials_polymer.resistivity_transform"
    #   inputs: ["results/data/polymer_signal_cleaned.csv"]
    #   outputs: ["results/data/polymer_material_properties.csv"]
    #   params:
    #     resistance_column: "resistance_ohm"
    #     area_column: "area_cm2"
    #     thickness_column: "thickness_um"
    #     thickness_correction_um: 20

# 5. Figure definitions
figures:
  - id: "Fig1"
    script: "hub_scripts/figures/plot.py"
    inputs: ["results/data/source/summary.csv"]
    output: "results/figures/Fig1.png" # validation and preview target
    cache: true
    # inputs supports glob patterns: ["results/data/*.csv"]
    # expand: batch (default) | each (one plot per file)
    # When expand: each, output must contain {stem}: "results/figures/{stem}_plot.png"
    # preset: journal_svg           # reference a named preset
    # layout_type: triplet          # optional: surfaced in MCP figure_metadata
    # canonical:                   # optional: diagnostic-only MCP consistency warning
    #   layout_type: triplet
    #   width_px: 2796
    #   height_px: 1338
    #   dimension_tolerance_px: 8
    #   match_family: "*_CvS_Fits"

diagrams:
  - id: "DeviceCrossSection"
    script: "hub_scripts/figures/device_cross_section.py"
    output: "results/figures/device_cross_section.svg"
    theme: "nature"
    format: "svg"
    cache: true

# 6. Optional execution settings
# FigOps uses these when choosing script executors.
# Step-level r_exec / python_exec values override these defaults.
execution:
  timeout_seconds: 600            # per-script timeout in seconds
  rscript: "Rscript"              # R executable path, e.g. /usr/local/bin/Rscript
  python: null                    # Python executable path; null means current interpreter

