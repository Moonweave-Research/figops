name: Publish Python package

on:
  workflow_dispatch:
    inputs:
      repository:
        description: Package index target
        required: true
        type: choice
        default: testpypi
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  release-ref:
    name: Verify release ref
    runs-on: ubuntu-latest
    steps:
      - name: Require main branch
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "publish.yml only publishes from refs/heads/main; got $GITHUB_REF" >&2
            exit 1
          fi

  actual-r:
    name: Actual R integration (gating)
    needs: release-ref
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install locked uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
          version: "0.11.25"
      - name: Sync locked dependencies
        run: uv sync --locked --group dev
      - name: Install R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          r-version: renv
      - name: Restore locked R dependencies
        uses: r-lib/actions/setup-renv@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
      - name: Export locked R library
        run: |
          locked_r_lib="$(Rscript -e 'cat(normalizePath(.libPaths()[1], winslash = "/", mustWork = TRUE))')"
          existing_r_libs_user="${R_LIBS_USER:-}"
          if [[ -z "$locked_r_lib" || "$locked_r_lib" == *$'\n'* || "$locked_r_lib" == *$'\r'* || "$existing_r_libs_user" == *$'\n'* || "$existing_r_libs_user" == *$'\r'* ]]; then
            echo "Refusing unsafe R library path" >&2
            exit 1
          fi
          r_libs_user="$locked_r_lib"
          if [[ -n "$existing_r_libs_user" ]]; then
            r_libs_user="$locked_r_lib:$existing_r_libs_user"
          fi
          printf '%s\n' "R_LIBS_USER=$r_libs_user" >> "$GITHUB_ENV"
      - name: Verify locked R and readr
        run: |
          verification_cwd="$(mktemp -d)"
          trap 'rm -rf -- "$verification_cwd"' EXIT
          cd "$verification_cwd"
          Rscript -e "stopifnot(getRversion() == '4.4.2', packageVersion('readr') == '2.2.0', packageVersion('dplyr') == '1.2.0')"
          Rscript -e "suppressPackageStartupMessages({library(readr); library(dplyr)})"
      - name: Run actual R integration tests
        run: >-
          uv run --locked python -m pytest -q
          --junitxml=actual-r-junit.xml
          tests/test_smoke.py::HubSmokeTest::test_scaffold_all_and_cache
          tests/test_process_runner_new.py::TestScaffoldRAnalysisInputContract::test_scaffold_r_analysis_reads_real_data_from_normalized_raw_dir
      - name: Require exactly two passed and zero skipped
        run: |
          uv run --locked python - <<'PY'
          import xml.etree.ElementTree as ET

          root = ET.parse("actual-r-junit.xml").getroot()
          suites = [root] if root.tag == "testsuite" else list(root.findall("testsuite"))
          counts = {
              key: sum(int(suite.attrib.get(key, "0")) for suite in suites)
              for key in ("tests", "failures", "errors", "skipped")
          }
          passed = counts["tests"] - counts["failures"] - counts["errors"] - counts["skipped"]
          if passed != 2 or counts["tests"] != 2 or any(counts[key] for key in ("failures", "errors", "skipped")):
              raise SystemExit(f"actual-R gate requires 2 passed/0 skipped; observed {counts}, passed={passed}")
          PY

  build:
    name: Build and verify distributions
    needs: [release-ref, actual-r]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install locked uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
          version: "0.11.25"
      - name: Sync locked dependencies
        run: uv sync --locked --group dev
      - name: Run release-critical tests
        run: >-
          uv run --locked python -m pytest -q
          tests/test_guarded_pypi_upload.py
          tests/test_package_metadata_smoke.py
          tests/test_packaging_metadata.py
          tests/test_public_package_surface.py
          tests/test_release_discipline.py
      - name: Build distributions
        run: uv build --no-sources
      - name: Package metadata smoke
        run: uv run --locked python scripts/package_metadata_smoke.py
      - name: Public package surface
        run: uv run --locked python scripts/public_package_surface.py
      - name: Consumer install smoke
        run: uv run --locked python scripts/consumer_install_smoke.py
      - name: Twine metadata check
        run: uv run --locked --with twine python -m twine check dist/*
      - name: Guard upload policy
        run: uv run --locked python scripts/guarded_pypi_upload.py --repository "${{ inputs.repository }}"
      - name: Store distribution artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: figops-dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    if: ${{ inputs.repository == 'testpypi' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/figops/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: figops-dist
          path: dist
      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish-pypi:
    name: Publish to PyPI
    if: ${{ inputs.repository == 'pypi' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/figops/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: figops-dist
          path: dist
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
