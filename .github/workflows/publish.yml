name: Publish Python package

on:
  workflow_dispatch:
    inputs:
      repository:
        description: Package index target
        required: true
        type: choice
        default: testpypi
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  release-ref:
    name: Verify release ref
    runs-on: ubuntu-latest
    steps:
      - name: Require main branch
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "publish.yml only publishes from refs/heads/main; got $GITHUB_REF" >&2
            exit 1
          fi

  build:
    name: Build and verify distributions
    needs: release-ref
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync
      - name: Install R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          r-version: release
      - name: Run release-critical tests
        run: >-
          uv run python -m pytest -q
          tests/test_guarded_pypi_upload.py
          tests/test_package_metadata_smoke.py
          tests/test_packaging_metadata.py
          tests/test_public_package_surface.py
          tests/test_release_discipline.py
      - name: Build distributions
        run: uv build
      - name: Package metadata smoke
        run: uv run python scripts/package_metadata_smoke.py
      - name: Public package surface
        run: uv run python scripts/public_package_surface.py
      - name: Consumer install smoke
        run: uv run python scripts/consumer_install_smoke.py
      - name: Twine metadata check
        run: uv run --with twine python -m twine check dist/*
      - name: Guard upload policy
        run: uv run python scripts/guarded_pypi_upload.py --repository "${{ inputs.repository }}"
      - name: Store distribution artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: figops-dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    if: ${{ inputs.repository == 'testpypi' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/figops/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: figops-dist
          path: dist
      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish-pypi:
    name: Publish to PyPI
    if: ${{ inputs.repository == 'pypi' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/figops/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: figops-dist
          path: dist
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
