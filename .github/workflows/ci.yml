name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  windows-security:
    name: Windows containment and symlinks (gating)
    runs-on: windows-latest
    env:
      FIGOPS_REQUIRE_SYMLINK_TESTS: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install locked uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
          version: "0.11.25"
      - name: Sync locked dependencies
        run: uv sync --locked --all-extras --group dev
      - name: Run Windows security tests
        run: >-
          uv run --locked python -m pytest -p no:cacheprovider -q
          --junitxml=windows-security-junit.xml
          "@.github/windows-security-pytest.txt"
      - name: Require zero skipped security tests
        shell: pwsh
        run: |
          [xml]$report = Get-Content -LiteralPath windows-security-junit.xml
          $skipped = @($report.SelectNodes("//testcase/skipped")).Count
          if ($skipped -ne 0) {
            throw "Windows security gate skipped $skipped test(s)."
          }

  test:
    name: Test (gating)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install locked uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
          version: "0.11.25"
      - name: Sync locked dependencies
        run: uv sync --locked --group dev
      - name: Run native macOS alias smoke
        run: >-
          uv run --locked python -m pytest -q
          --basetemp=/var/tmp/figops-macos-path-identity-${{ github.run_id }}-${{ github.run_attempt }}
          --junitxml=macos-path-identity-junit.xml
          tests/test_macos_path_identity.py
          tests/test_project_config_reader.py::test_absolute_config_accepts_macos_var_alias
      - name: Require exactly nine native macOS alias passes
        run: |
          uv run --locked python - <<'PY'
          import xml.etree.ElementTree as ET

          root = ET.parse("macos-path-identity-junit.xml").getroot()
          suites = [root] if root.tag == "testsuite" else list(root.findall("testsuite"))
          counts = {
              key: sum(int(suite.attrib.get(key, "0")) for suite in suites)
              for key in ("tests", "failures", "errors", "skipped")
          }
          passed = counts["tests"] - counts["failures"] - counts["errors"] - counts["skipped"]
          if passed != 9 or counts["tests"] != 9 or any(counts[key] for key in ("failures", "errors", "skipped")):
              raise SystemExit(f"native macOS alias gate requires 9 passed/0 skipped; observed {counts}, passed={passed}")
          PY
      - name: Tests
        run: uv run --locked python -m pytest -q

  actual-r:
    name: Actual R integration (gating)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install locked uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
          version: "0.11.25"
      - name: Sync locked dependencies
        run: uv sync --locked --group dev
      - name: Install R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          r-version: renv
      - name: Restore locked R dependencies
        uses: r-lib/actions/setup-renv@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
      - name: Verify locked R and readr
        run: |
          Rscript -e "stopifnot(getRversion() == '4.4.2', packageVersion('readr') == '2.2.0')"
          Rscript -e "suppressPackageStartupMessages(library(readr))"
      - name: Run actual R integration tests
        run: >-
          uv run --locked python -m pytest -q
          --junitxml=actual-r-junit.xml
          tests/test_smoke.py::HubSmokeTest::test_scaffold_all_and_cache
          tests/test_process_runner_new.py::TestScaffoldRAnalysisInputContract::test_scaffold_r_analysis_reads_real_data_from_normalized_raw_dir
      - name: Require exactly two passed and zero skipped
        run: |
          uv run --locked python - <<'PY'
          import xml.etree.ElementTree as ET

          root = ET.parse("actual-r-junit.xml").getroot()
          suites = [root] if root.tag == "testsuite" else list(root.findall("testsuite"))
          counts = {
              key: sum(int(suite.attrib.get(key, "0")) for suite in suites)
              for key in ("tests", "failures", "errors", "skipped")
          }
          passed = counts["tests"] - counts["failures"] - counts["errors"] - counts["skipped"]
          if passed != 2 or counts["tests"] != 2 or any(counts[key] for key in ("failures", "errors", "skipped")):
              raise SystemExit(f"actual-R gate requires 2 passed/0 skipped; observed {counts}, passed={passed}")
          PY

  lint:
    name: Ruff (gating)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install locked uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
          version: "0.11.25"
      - name: Sync locked dependencies
        run: uv sync --locked --group dev
      - name: Ruff
        run: uv run --locked ruff check .

  audit:
    name: Dependency audit (advisory)
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install locked uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
          version: "0.11.25"
      - name: Export resolved requirements
        run: uv export --locked --no-emit-project --no-hashes -o requirements-audit.txt
      - name: pip-audit
        # Advisory: surfaces known CVEs without blocking merges (a transitive CVE may have
        # no released fix). Triage findings and bump floors in pyproject.toml.
        continue-on-error: true
        run: uvx --from pip-audit==2.10.1 pip-audit -r requirements-audit.txt --strict
