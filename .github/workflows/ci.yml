name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync
      - name: Ruff
        run: uv run ruff check .
      - name: Tests
        run: uv run python -m pytest -q

  audit:
    name: Dependency audit (advisory)
    runs-on: ubuntu-latest
    # Advisory: surfaces known CVEs in the dependency tree without blocking merges
    # (a transitive CVE may have no released fix yet). Triage findings, then tighten
    # floors in pyproject.toml.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Export resolved requirements
        run: uv export --no-emit-project --no-hashes -o requirements-audit.txt
      - name: pip-audit
        run: uvx pip-audit -r requirements-audit.txt --strict
