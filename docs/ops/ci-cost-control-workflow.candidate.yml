name: Local Cost-Controlled CI Candidate

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".omo/**"
  workflow_dispatch:
    inputs:
      run_heavy_gates:
        description: "Run full local-parity gates and expensive evidence jobs."
        required: false
        type: boolean
        default: false

concurrency:
  group: figops-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quick-local-parity:
    name: Quick local-parity gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Run focused tests
        run: python hub_uv.py run python -m pytest tests/test_runtime_paths.py tests/test_release_discipline.py -q -W error

  heavy-gates:
    name: Manual heavy evidence gates
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_heavy_gates }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Run full pytest gate
        run: python hub_uv.py run python -m pytest -q -W error
